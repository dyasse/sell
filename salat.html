<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أوقات الصلاة - نور</title>
  
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" />
  
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* CSS خاص بصفحة الصلاة */
    .salat-hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      text-align: center;
      padding: 50px 20px 80px;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
      position: relative;
      overflow: hidden;
    }
    
    .location-box {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(5px);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      border-radius: 30px;
      margin-top: 15px;
      font-size: 16px;
    }

    .salat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: -40px auto 40px;
      padding: 0 5%;
      position: relative;
      z-index: 10;
    }

    .salat-card {
      background: white;
      border-radius: 20px;
      padding: 25px 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      border: 2px solid transparent;
      transition: 0.3s;
    }
    
    /* ستايل الصلاة القادمة */
    .salat-card.next-salat {
      border-color: #3b82f6;
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
    }

    .salat-name { font-size: 20px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
    .salat-time { font-family: 'Cairo', sans-serif; font-size: 32px; font-weight: 700; color: #3b82f6; }

    /* القبلة */
    .qibla-section { text-align: center; margin-top: 40px; }
    .compass-container { position: relative; width: 250px; height: 250px; margin: 20px auto; border-radius: 50%; border: 8px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; display: flex; align-items: center; justify-content: center; }
    .compass-needle { width: 10px; height: 160px; background: linear-gradient(to bottom, #ef4444 50%, #94a3b8 50%); border-radius: 5px; position: absolute; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2; }
    .kaaba-icon { position: absolute; font-size: 40px; color: #1e293b; z-index: 1; opacity: 0.2; }
    .qibla-btn { background: #1e293b; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; margin-top: 15px; }

    /* الوضع الليلي */
    body.dark .salat-hero { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
    body.dark .salat-card { background: #1e1e1e; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    body.dark .salat-name { color: #f8fafc; }
    body.dark .salat-time { color: #60a5fa; }
    body.dark .salat-card.next-salat { border-color: #60a5fa; box-shadow: 0 15px 30px rgba(96, 165, 250, 0.2); }
    body.dark .compass-container { background: #1e1e1e; border-color: #334155; }
    body.dark .kaaba-icon { color: #f8fafc; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
      <i class="fa-solid fa-book-quran"></i>
      <span>نور</span>
    </div>
    <div class="nav-actions">
      <button onclick="window.location.href='index.html'" class="back-btn">
        <i class="fa-solid fa-house"></i> الرئيسية
      </button>
      <button id="themeToggle" class="theme-btn" aria-label="تغيير المظهر">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </nav>

  <header class="salat-hero">
    <div class="hero-content">
      <h1 class="hero-title" style="margin-bottom: 5px;">أوقات <span>الصلاة</span></h1>
      <p style="font-size: 20px; margin-bottom: 10px;" id="nextSalatText">جاري تحديد الموقع...</p>
      
      <div class="location-box" id="locationBox">
        <i class="fa-solid fa-location-dot"></i>
        <span id="cityName">تحديد الموقع...</span>
      </div>
    </div>
  </header>

  <main>
    <div class="salat-grid" id="salatTimesContainer">
      <div class="salat-card"><p>جاري التحميل...</p></div>
    </div>

    <section class="qibla-section">
      <h2 style="color: #1e293b; font-family: 'Cairo', sans-serif;">اتجاه القبلة</h2>
      <p style="color: #64748b;">اضغط على الزر وقم بتدوير هاتفك</p>
      
      <div class="compass-container">
        <i class="fa-solid fa-kaaba kaaba-icon"></i>
        <div class="compass-needle" id="compassNeedle"></div>
      </div>
      
      <button class="qibla-btn" onclick="startCompass()">
        <i class="fa-solid fa-compass"></i> حدد اتجاه القبلة
      </button>
      <p id="qiblaStatus" style="color: #ef4444; margin-top: 10px; font-size: 14px;"></p>
    </section>
  </main>

  <script src="salat.js"></script>
</body>
</html>
