<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أوقات الصلاة - نور</title>
  <meta name="description" content="أوقات الصلاة واتجاه القبلة في تطبيق نور" />
  <link rel="canonical" href="https://nour-quran.com/salat.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="نور" />
  <meta property="og:url" content="https://nour-quran.com/salat.html" />
  <meta property="og:title" content="نور" />
  <meta property="og:locale" content="ar_AR" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="brand">
      <div class="brand-mark">
        <img src="assets/favicon.png" alt="نور" />
      </div>
      <div class="brand-text">
        <span class="brand-title">نور</span>
        <span class="brand-subtitle">Prayer Times</span>
      </div>
    </a>

    <div class="nav-actions nav-actions-rtl">
      <a href="settings.html" class="share-app-btn" aria-label="الإعدادات">
        <i class="fa-solid fa-gear"></i>
      </a>
      <button id="themeToggleBtn" class="share-app-btn theme-toggle-btn" type="button" aria-label="الوضع الليلي">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </nav>

  <main class="page-shell">
    <section class="hero-panel prayer-hero">
      <div class="hero-badge">
        <i class="fa-solid fa-mosque"></i>
        <span>مواقيت الصلاة والقبلة</span>
      </div>

      <h1>أوقات الصلاة</h1>
      <p id="locationText">جاري تحديد الموقع...</p>

      <div class="prayer-top-meta">
        <div class="meta-pill">
          <i class="fa-solid fa-location-dot"></i>
          <span id="cityName">...</span>
        </div>

        <div class="meta-pill next-pill">
          <i class="fa-regular fa-clock"></i>
          <span id="nextPrayerText">جاري حساب الصلاة القادمة...</span>
        </div>
      </div>

      <div class="countdown-box" id="countdownBox">
        <span class="countdown-label">الوقت المتبقي</span>
        <strong id="countdownValue">--:--:--</strong>
      </div>

      <div class="prayer-actions">
        <button class="nav-btn" id="enableNotificationsBtn" type="button">
          <i class="fa-regular fa-bell"></i>
          تفعيل التنبيهات
        </button>

        <button class="secondary-btn" id="refreshLocationBtn" type="button">
          <i class="fa-solid fa-rotate"></i>
          تحديث الموقع
        </button>
      </div>
    </section>

    <section id="prayerTimes" class="prayer-grid">
      <div class="status-box">جاري تحميل أوقات الصلاة...</div>
    </section>

    <section class="qibla-panel">
      <div class="qibla-header">
        <h2>اتجاه القبلة</h2>
        <p>فعّل البوصلة وحرّك الهاتف ليظهر الاتجاه الحقيقي</p>
      </div>

      <div class="compass-card">
        <div class="compass-shell">
          <div class="compass-ring"></div>
          <div class="compass-label north">N</div>
          <div class="compass-label east">E</div>
          <div class="compass-label south">S</div>
          <div class="compass-label west">W</div>

          <div class="qibla-marker" id="qiblaMarker">
            <i class="fa-solid fa-kaaba"></i>
          </div>

          <div class="compass-needle" id="compassNeedle">
            <span class="needle-head"></span>
            <span class="needle-tail"></span>
          </div>

          <div class="compass-center-dot"></div>
        </div>

        <div class="qibla-meta">
          <div class="meta-card">
            <span>زاوية القبلة</span>
            <strong id="qiblaAngle">--°</strong>
          </div>
          <div class="meta-card">
            <span>اتجاه الهاتف</span>
            <strong id="deviceHeading">--°</strong>
          </div>
        </div>

        <div class="qibla-actions">
          <button class="nav-btn" id="startCompassBtn" type="button">
            <i class="fa-solid fa-compass"></i>
            تشغيل البوصلة
          </button>
        </div>

        <p id="qiblaStatus" class="qibla-status">اضغط على الزر لتشغيل البوصلة.</p>
      </div>
    </section>
  </main>
  <script src="app-shell.js"></script>
  <script src="monetization.js"></script>

  <script src="salat.js"></script>
</body>
</html>
