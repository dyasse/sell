<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نور - الرئيسية</title>
  <meta name="description" content="تطبيق نور للقرآن الكريم والأذكار والأدعية" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <img src="assets/favicon.png" alt="شعار نور" />
      <span>نور</span>
    </div>
  </nav>

  <main class="container">
    <section class="hero-card text-center" style="margin-bottom: 20px; padding: 28px 20px;">
      <h1 style="font-size: 36px; margin-bottom: 8px;">نُور</h1>
      <p style="color: #64748b;">رفيقك للتقرب من الله</p>
    </section>

    <section id="bookmarkSection" class="bookmark-card" style="display: none; margin-bottom: 20px;">
      <a
        href="#"
        id="resumeLink"
        style="display: flex; align-items: center; justify-content: space-between; gap: 12px;"
      >
        <div style="display: flex; align-items: center; gap: 12px;">
          <i class="fa-solid fa-bookmark" style="color: #f59e0b; font-size: 20px;"></i>
          <div>
            <small style="display: block; opacity: 0.8; font-size: 12px;">واصل القراءة من:</small>
            <strong id="bookmarkTitle" style="font-size: 16px;"></strong>
          </div>
        </div>
        <i class="fa-solid fa-chevron-left"></i>
      </a>
    </section>

    <section class="home-grid">
      <div class="home-card" onclick="window.location.href='quran.html'">
        <i class="fa-solid fa-book-quran"></i>
        <h3>القرآن الكريم</h3>
        <p>قراءة وتفسير</p>
      </div>

      <div class="home-card" onclick="window.location.href='adhkar.html'">
        <i class="fa-solid fa-rosary"></i>
        <h3>الأذكار</h3>
        <p>حصن المسلم</p>
      </div>

      <div class="home-card" onclick="window.location.href='duas.html'">
        <i class="fa-solid fa-hands-praying"></i>
        <h3>الأدعية</h3>
        <p>أدعية جامعة</p>
      </div>

      <div class="home-card" onclick="window.location.href='favorites.html'">
        <i class="fa-solid fa-heart"></i>
        <h3>المفضلة</h3>
        <p>العناصر المحفوظة</p>
      </div>

      <div class="home-card" onclick="window.location.href='support.html'">
        <i class="fa-solid fa-hand-holding-heart"></i>
        <h3>ادعمنا</h3>
        <p>ساهم في الخير</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
