<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نور - قرآن وأذكار</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="simple-hero">
    <div class="simple-hero-content">
      <h1>نور</h1>
      <p class="hero-subtitle">رفيقك اليومي للقرآن الكريم والأذكار</p>

      <div class="ayah-box clean-ayah-box">
        <h2>آية اليوم</h2>
        <p id="dailyAyahText">جاري تحميل آية اليوم...</p>
        <span id="dailyAyahRef"></span>
      </div>

      <div class="hero-actions">
        <button onclick="scrollToQuran()">القرآن الكريم</button>
        <button onclick="goToAdhkar('sabah')">أذكار الصباح</button>
        <button onclick="goToAdhkar('masa')">أذكار المساء</button>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن سورة..." />
      </div>

      <button id="themeToggle" class="theme-btn">🌙 الوضع الليلي</button>
    </div>
  </header>

  <main class="home-main">
    <section class="quick-sections">
      <div class="quick-card">
        <h3>القرآن الكريم</h3>
        <p>تصفح السور الكريمة من فهرس منظم واحترافي.</p>
        <button onclick="scrollToQuran()">فتح الفهرس</button>
      </div>

      <div class="quick-card">
        <h3>الأذكار</h3>
        <p>أذكار الصباح والمساء مع عداد ذكي وتقدم محفوظ.</p>
        <div class="card-actions">
          <button onclick="goToAdhkar('sabah')">الصباح</button>
          <button onclick="goToAdhkar('masa')">المساء</button>
        </div>
      </div>
    </section>

    <section id="quranSection" class="home-section">
      <div class="section-head">
        <h2>فهرس القرآن الكريم</h2>
        <p>اختر السورة التي تريد قراءتها</p>
      </div>

      <div id="quranList" class="cards"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
