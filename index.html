<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور - الرئيسية</title>
    <link rel="icon" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="assets/favicon.png" alt="Logo">
            <span>نور</span>
        </div>
        <div class="auth-btns">
            <button class="btn-login"><i class="fa-brands fa-google" style="color: #db4437;"></i></button>
            <button class="btn-login"><i class="fa-brands fa-facebook" style="color: #4267B2;"></i></button>
        </div>
    </nav>

    <header class="hero">
        <h1>نُور</h1>
        <p>رفيقك للتقرب من الله</p>
    </header>

    <div id="bookmarkSection" class="container" style="display: none; margin-top: -40px;">
        <div class="card-bookmark" id="resumeLink">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-bookmark" style="color: #f59e0b; font-size: 20px;"></i>
                <div>
                    <small style="display: block; opacity: 0.8; font-size: 12px;">واصل القراءة من:</small>
                    <strong id="bookmarkTitle" style="font-size: 16px;"></strong>
                </div>
            </div>
            <i class="fa-solid fa-chevron-left"></i>
        </div>
    </div>

    <main class="container">
        <div class="grid">
            <div class="card" onclick="location.href='quran.html'"><i class="fa-solid fa-book-quran"></i><h3>القرآن الكريم</h3></div>
            <div class="card" onclick="location.href='adhkar.html'"><i class="fa-solid fa-rosary"></i><h3>الأذكار</h3></div>
            <div class="card" onclick="location.href='duas.html'"><i class="fa-solid fa-hands-praying"></i><h3>الأدعية</h3></div>
            <div class="card support" onclick="location.href='support.html'"><i class="fa-solid fa-heart"></i><h3>ادعمنا</h3></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
