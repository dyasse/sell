<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نور - قرآن وأذكار</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>نور</h1>
    <p>تطبيق قرآن وأذكار يومية</p>
    <input type="text" id="searchInput" placeholder="ابحث عن سورة أو ذكر" />
    <button id="themeToggle" class="theme-btn">🌙 الوضع الليلي</button>
  </header>
<div style="text-align:center; margin:20px 0;">
  <a href="favorites.html" class="back-btn">فتح المفضلة</a>
</div>
  <main class="home-main">
  <section class="home-grid">
    <div class="home-card">
      <h2>القرآن الكريم</h2>
      <p>تصفح السور الكريمة واقرأ القرآن بخط واضح وجميل</p>
      <button onclick="scrollToQuran()">فتح القرآن</button>
    </div>

    <div class="home-card">
      <h2>الأذكار</h2>
      <p>أذكار الصباح والمساء مع عداد ذكي وتقدم محفوظ</p>
      <div class="card-actions">
        <button onclick="goToAdhkar('sabah')">أذكار الصباح</button>
        <button onclick="goToAdhkar('masa')">أذكار المساء</button>
      </div>
    </div>
  </section>

  <section id="quranSection" class="home-section">
    <h2>القرآن الكريم</h2>
    <div id="quranList" class="cards"></div>
  </section>
</main>
  <script src="script.js"></script>
</body>
</html>
