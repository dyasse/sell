<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور - الصفحة الرئيسية</title>
    <link rel="icon" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="assets/favicon.png" alt="كعبة">
            <span>نور</span>
        </div>
        <div class="login-actions">
            <button class="login-btn google"><i class="fa-brands fa-google"></i></button>
            <button class="login-btn facebook"><i class="fa-brands fa-facebook"></i></button>
        </div>
    </nav>

    <header class="hero">
        <h1>نُور</h1>
        <p>رفيقك للتقرب من الله</p>
    </header>

    <main class="container">
        <div class="services-grid">
            <div class="card" onclick="location.href='quran.html'">
                <i class="fa-solid fa-book-quran"></i>
                <h3>القرآن الكريم</h3>
                <p>قراءة وتفسير</p>
            </div>
<div id="resumeSection" class="container" style="display: none; margin-top: -30px; position: relative; z-index: 5;">
    <div class="resume-card" id="resumeBtn">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="icon-circle"><i class="fa-solid fa-bookmark"></i></div>
            <div>
                <h4 style="font-size: 14px; opacity: 0.8;">واصل القراءة من:</h4>
                <p id="resumeText" style="font-weight: bold; font-size: 18px; color: var(--primary);"></p>
            </div>
        </div>
        <i class="fa-solid fa-chevron-left"></i>
    </div>
</div>
            <div class="card" onclick="location.href='adhkar.html'">
                <i class="fa-solid fa-rosary"></i>
                <h3>الأذكار</h3>
                <p>حصن المسلم</p>
            </div>

            <div class="card" onclick="location.href='duas.html'">
                <i class="fa-solid fa-hands-praying"></i>
                <h3>الأدعية</h3>
                <p>أدعية جامعة</p>
            </div>

            <div class="card support" onclick="location.href='support.html'">
                <i class="fa-solid fa-heart"></i>
                <h3>ادعمنا</h3>
                <p>ساهم في الخير</p>
            </div>
        </div>
    </main>

</body>
</html>
