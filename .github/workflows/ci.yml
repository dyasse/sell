name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  build:
    name: Build web
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        env:
          AD_CLIENT_ID: ${{ secrets.AD_CLIENT_ID }}
          AD_SLOT_ID: ${{ secrets.AD_SLOT_ID }}
          ADS_PUBLISHER_ID: ${{ secrets.ADS_PUBLISHER_ID }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          QURAN_API_URL: ${{ secrets.QURAN_API_URL }}
          QURAN_CHAPTERS_API_URL: ${{ secrets.QURAN_CHAPTERS_API_URL }}
          QURAN_AUDIO_BASE_URL: ${{ secrets.QURAN_AUDIO_BASE_URL }}
          QURAN_RECITER_ID: ${{ secrets.QURAN_RECITER_ID }}
          QURAN_ARTWORK_URL: ${{ secrets.QURAN_ARTWORK_URL }}
        run: npm run build:web

  deploy-placeholder:
    name: Deploy placeholder
    runs-on: ubuntu-latest
    needs: build
    if: ${{ false }}
    steps:
      - name: Placeholder deploy step
        run: echo "Add Vercel, Pages, or Play deployment here and read credentials from GitHub Actions secrets."
