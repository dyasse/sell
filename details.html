<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قراءة القرآن - نور</title>
    <link rel="icon" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <i class="fa-solid fa-arrow-right"></i>
            <span id="surahTitle">جاري التحميل...</span>
        </a>
    </nav>

    <main class="container">
        <div id="quranArea" class="quran-card">
            <div class="loading-state">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                <p>جاري تحميل كلام الله...</p>
            </div>
        </div>
        
        <div id="nextSurahContainer"></div>
    </main>

    <div id="tafsirModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="tTitle">التفسير</h3>
                <span class="close-modal" onclick="closeTafsir()">&times;</span>
            </div>
            <div class="modal-body">
                <p id="tBody">جاري جلب التفسير...</p>
            </div>
            <div class="modal-footer">
                <button onclick="closeTafsir()" class="btn-close">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="details.js"></script>
</body>
</html>
