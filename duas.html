<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأدعية - نور</title>
  <meta name="description" content="مجموعة أدعية مختارة في تطبيق نور" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="assets/favicon.png" />
  <style>
    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 50px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .back-link {
      color: #0f766e;
      text-decoration: none;
      font-weight: 800;
    }

    .hero-card,
    .dua-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      border: 1px solid #eef2f7;
    }

    .hero-card {
      padding: 22px;
      text-align: center;
      margin-bottom: 20px;
    }

    .hero-card h1 {
      margin-bottom: 8px;
    }

    .hero-card p {
      color: #64748b;
    }

    .duas-list {
      display: grid;
      gap: 14px;
    }

    .dua-card {
      padding: 18px;
      border-right: 5px solid #0f766e;
    }

    .dua-text {
      font-family: "Amiri", serif;
      font-size: 28px;
      line-height: 2;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .dua-source {
      color: #64748b;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .dua-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dua-btn {
      border: none;
      border-radius: 12px;
      padding: 11px 15px;
      cursor: pointer;
      font-weight: 800;
      font-family: inherit;
    }

    .dua-btn.primary {
      background: #0f766e;
      color: #fff;
    }

    .dua-btn.secondary {
      background: #f1f5f9;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="topbar">
      <a href="index.html" class="back-link">← الرئيسية</a>
      <a href="favorites.html" class="back-link">المفضلة</a>
    </div>

    <div class="hero-card">
      <h1>أدعية مختارة</h1>
      <p>أدعية جامعة من القرآن والسنة، بحفظ سريع ومشاركة سهلة</p>
    </div>

    <div id="duasContainer" class="duas-list"></div>
  </div>

  <script src="duas.js"></script>
</body>
</html>
