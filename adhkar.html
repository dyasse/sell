<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>الأذكار - نور</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar"><a href="index.html" class="logo"><img src="assets/favicon.png"> <span>نور</span></a></nav>
    <header class="hero-section"><h1>الأذكار</h1></header>
    <main class="main-content" id="adhkarContent"></main>
    <script>
        async function load() {
            const res = await fetch('https://raw.githubusercontent.com/nawafalqari/azkar-api/master/azkar.json');
            const data = await res.json();
            const type = new URLSearchParams(window.location.search).get('type') === 'sabah' ? 'أذكار الصباح' : 'أذكار المساء';
            document.getElementById('adhkarContent').innerHTML = data[type].map(z => `
                <div class="quran-container" style="margin-bottom:15px; padding:20px;">
                    <p style="font-family:Amiri; font-size:22px;">${z.content}</p>
                    <div style="text-align:left; margin-top:10px; color:var(--primary);">التكرار: ${z.count}</div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
