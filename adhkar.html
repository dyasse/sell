<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأذكار - نور</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
      <i class="fa-solid fa-book-quran"></i>
      <span>نور</span>
    </div>
    <div class="nav-actions">
      <button onclick="window.location.href='index.html'" class="back-btn">
        <i class="fa-solid fa-house"></i> الرئيسية
      </button>
      <button id="themeToggle" class="theme-btn" aria-label="تغيير المظهر">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </nav>

  <header class="hero-section quran-hero">
    <div class="hero-content">
      <h1 class="hero-title" id="adhkarTitle">الأذكار <span>اليومية</span></h1>
      <p class="hero-subtitle" id="adhkarSubtitle">حصن مسلمك بذكر الله مع العداد الذكي</p>

      <div class="adhkar-hero-actions">
        <button onclick="window.location.href='adhkar.html?type=sabah'" class="hero-link-btn" id="btnSabah">
          <i class="fa-solid fa-sun"></i> الصباح
        </button>
        <button onclick="window.location.href='adhkar.html?type=masa'" class="hero-link-btn" id="btnMasa">
          <i class="fa-solid fa-moon"></i> المساء
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="adhkar-top-section">
      <div id="doneBox" class="done-box premium-done-box" style="display:none;"></div>
      
      <div id="adhkarStats" class="adhkar-stats-box"></div>
    </section>

    <section>
      <div id="adhkarContainer" class="adhkar-container premium-adhkar-grid"></div>
    </section>
  </main>

  <script src="adhkar.js"></script>
</body>
</html>
